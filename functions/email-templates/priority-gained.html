<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선거구 우선권 획득</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background-color: #f5f5f5;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }
    .emoji {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .content {
      padding: 40px 30px;
      line-height: 1.6;
      color: #333;
    }
    .content p {
      margin: 0 0 16px 0;
      font-size: 16px;
    }
    .highlight {
      background: #f0f7ff;
      border-left: 4px solid #667eea;
      padding: 16px;
      margin: 24px 0;
      border-radius: 4px;
    }
    .button {
      display: inline-block;
      background: #667eea;
      color: white !important;
      padding: 14px 32px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 24px;
      transition: background 0.3s;
    }
    .button:hover {
      background: #5568d3;
    }
    .footer {
      background: #f9f9f9;
      padding: 24px 30px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }
    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="emoji">🎉</div>
      <h1>우선권 획득 안내</h1>
    </div>

    <div class="content">
      <p>안녕하세요, <strong>{{userName}}</strong>님!</p>

      <p>좋은 소식을 전해드립니다.</p>

      <div class="highlight">
        <strong>{{districtName}}</strong> 선거구의 우선권을 획득하셨습니다.
      </div>

      <p>이제 다음 서비스를 제한 없이 이용하실 수 있습니다:</p>
      <ul>
        <li>월 90회 콘텐츠 생성</li>
        <li>무제한 수정 및 재생성</li>
        <li>고급 개인화 기능</li>
      </ul>

      <p>지금 바로 시작해보세요!</p>

      <center>
        <a href="{{loginUrl}}/dashboard" class="button">대시보드로 이동</a>
      </center>
    </div>

    <div class="footer">
      <p>
        이 이메일은 자동으로 발송되었습니다.<br>
        문의사항이 있으시면 <a href="mailto:{{supportEmail}}">{{supportEmail}}</a>로 연락주세요.
      </p>
      <p style="margin-top: 12px; color: #999;">
        © 2025 {{companyNameEn}}. All rights reserved.
      </p>
    </div>
  </div>
</body>
</html>
